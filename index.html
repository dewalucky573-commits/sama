<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Spesial Kita ✨</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --success-color: #00b894;
            --wrong-color: #ff7675;
            --background-color: #f9f9fb;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-top: 40px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .progress-bar {
            font-size: 14px;
            color: #b2bec3;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .question-box {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-box {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .input-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(108, 92, 231, 0.2);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: #5b4cc4;
            transform: translateY(-2px);
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 15px;
            min-height: 22px;
        }

        .feedback.correct { color: var(--success-color); }
        .feedback.wrong { color: var(--wrong-color); }

        .result-box {
            display: none;
        }
        .result-box h2 {
            color: var(--success-color);
            font-size: 28px;
            margin-bottom: 10px;
        }
        .score-text {
            font-size: 18px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Area Game Utama -->
        <div id="quiz-area">
            <h1>Kuis Memori Kita ✨</h1>
            <div class="progress-bar" id="progress">Pertanyaan 1 dari 10</div>
            
            <div class="question-box" id="question">Memuat pertanyaan...</div>
            
            <input type="text" id="answer-input" class="input-box" placeholder="Ketik jawabanmu di sini..." autocomplete="off">
            
            <button class="btn" id="submit-btn" onclick="checkAnswer()">Kirim Jawaban</button>
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- Area Hasil Akhir -->
        <div id="result-area" class="result-box">
            <h2>Hore! Selesai! 🎉</h2>
            <p class="score-text" id="score-summary">Kamu berhasil menjawab semua pertanyaan!</p>
            <button class="btn" onclick="restartGame()">Main Lagi</button>
        </div>
    </div>

    <script>
        // Data Pertanyaan dan Jawaban
        const quizData = [
            { q: "Siapa nama emak Aku?", a: "DALIMA" },
            { q: "Apa bekal yang kedua aku kasih ke kamu?", a: "roti" },
            { q: "Kapan pertama kali aku DM kamu?", a: "dua delapan februari dua ribu dua lima" },
            { q: "Apa makanan yang pertama kali aku beli di cfd bareng kamu?", a: "roti bakar" },
            { q: "Di mana tempat pertama kali kita fotbar? (Bukan berdua ya, pertama kali kita satu frame dan samping-sampingan)", a: "cfd" },
            { q: "Berapa lama durasi kita pertama kali teleponan?", a: "dua belas" },
            { q: "Apa yang paling dewa suka dari imbi?", a: "imbi mode centil" },
            { q: "Kapan setiap kali Imbi mode centil?", a: "kalau mood" },
            { q: "Di mana pertama kali aku gandeng kamu?", a: "di rel" },
            { q: "Di mana pertama kali kita saling senderan?", a: "di bioskop" }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionEl = document.getElementById('question');
        const progressEl = document.getElementById('progress');
        const inputEl = document.getElementById('answer-input');
        const feedbackEl = document.getElementById('feedback');
        const submitBtn = document.getElementById('submit-btn');
        
        const quizArea = document.getElementById('quiz-area');
        const resultArea = document.getElementById('result-area');
        const scoreSummaryEl = document.getElementById('score-summary');

        function loadQuestion() {
            feedbackEl.innerText = "";
            inputEl.value = "";
            inputEl.style.borderColor = "#dfe6e9";
            submitBtn.innerText = "Kirim Jawaban";
            submitBtn.setAttribute("onclick", "checkAnswer()");

            if (currentQuestionIndex < quizData.length) {
                progressEl.innerText = `Pertanyaan ${currentQuestionIndex + 1} dari ${quizData.length}`;
                questionEl.innerText = quizData[currentQuestionIndex].q;
                inputEl.focus();
            } else {
                showResults();
            }
        }

        function checkAnswer() {
            const userAnswer = inputEl.value.trim().toLowerCase().replace(/\s+/g, ' ');
            const correctAnswer = quizData[currentQuestionIndex].a.trim().toLowerCase().replace(/\s+/g, ' ');

            if (userAnswer === "") {
                feedbackEl.className = "feedback wrong";
                feedbackEl.innerText = "Isi dulu jawabannya ya!";
                return;
            }

            if (userAnswer === correctAnswer) {
                feedbackEl.className = "feedback correct";
                feedbackEl.innerText = "Benar! Hebat banget kamu! ❤️";
                inputEl.style.borderColor = "var(--success-color)";
                score++;
            } else {
                feedbackEl.className = "feedback wrong";
                feedbackEl.innerText = `Salah mwiw, jawabannya: "${quizData[currentQuestionIndex].a}"`;
                inputEl.style.borderColor = "var(--wrong-color)";
            }

            submitBtn.innerText = "Pertanyaan Selanjutnya";
            submitBtn.setAttribute("onclick", "nextQuestion()");
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function showResults() {
            quizArea.style.display = "none";
            resultArea.style.display = "block";
            scoreSummaryEl.innerHTML = `Skor Kamu: <b>${score}</b> dari <b>${quizData.length}</b> pertanyaan.<br><br>` + 
                                       (score === quizData.length ? "Ingatanmu luar biasa sempurna tentang kita! 🥰" : "Keren! Masih ada yang lupa sedikit, coba main lagi yuk!");
        }

        function restartGame() {
            currentQuestionIndex = 0;
            score = 0;
            resultArea.style.display = "none";
            quizArea.style.display = "block";
            loadQuestion();
        }

        loadQuestion();

        inputEl.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
